name: Upload DLL

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Enviar DLL como artefato
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: GrandPieceOnlineGPO.dll
