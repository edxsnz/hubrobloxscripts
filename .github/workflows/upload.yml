name: Upload DLL and EXE

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'GrandPieceOnlineGPO.dll'
      - 'Retarded.exe'

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Enviar arquivos como artefato
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            GrandPieceOnlineGPO.dll
            Retarded.exe